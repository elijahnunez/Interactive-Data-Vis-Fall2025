<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Data Visualization</title>
    <script src="script.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        h1 {
            color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #0056b3;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Interactive Data Visualization</h1>
    <p>lorep ipsum</p>
    <a href="https://www.google.com">Google</a>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Value</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alpha</td>
                <td>42</td>
                <td>Active</td>
            </tr>
            <tr>
                <td>Beta</td>
                <td>27</td>
                <td>Inactive</td>
            </tr>
            <tr>
                <td>Gamma</td>
                <td>13</td>
                <td>Active</td>
            </tr>
        </tbody>
    </table>
    <button onclick="addName()"> Click Me</button>
    <input type="text" placeholder="Enter text here" id="name">
</body>
</html>
